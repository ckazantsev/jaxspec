name: Unit tests
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
  pull_request:
    paths-ignore:
      - 'README.md'

permissions:
  contents: read

jobs:
  fast-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          src:
            - 'src/**'
          pyproject:
            - 'pyproject.toml'

    - name: Set up Python 3.12
      if: steps.filter.outputs.src == 'true' || steps.filter.outputs.pyproject == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install uv
      if: steps.filter.outputs.src == 'true' || steps.filter.outputs.pyproject == 'true'
      uses: astral-sh/setup-uv@v5

    - name: Install dependencies
      if: steps.filter.outputs.src == 'true' || steps.filter.outputs.pyproject == 'true'
      run: uv sync --all-groups

    - name: Run fast tests
      if: steps.filter.outputs.src == 'true' || steps.filter.outputs.pyproject == 'true'
      run: uv run pytest -m "not slow"

  full-tests:
    runs-on: ubuntu-latest
    needs: fast-tests

    steps:
    - uses: actions/checkout@v4

    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          src:
            - 'src/**'
          pyproject:
            - 'pyproject.toml'

    - name: Install uv
      if: steps.filter.outputs.src == 'true' || steps.filter.outputs.pyproject == 'true'
      uses: astral-sh/setup-uv@v5

    - name: Set up micromamba with xspec environment
      if: steps.filter.outputs.src == 'true' || steps.filter.outputs.pyproject == 'true'
      uses: mamba-org/setup-micromamba@v2
      with:
        environment-file: environment-xspec.yml
        cache-environment: true
        cache-downloads: true

    - name: Install jaxspec and test dependencies
      if: steps.filter.outputs.src == 'true' || steps.filter.outputs.pyproject == 'true'
      run: |
        export UV_PROJECT_ENVIRONMENT="$CONDA_PREFIX"
        uv sync --group test
      shell: micromamba-shell {0}

    - name: Run full test suite
      if: steps.filter.outputs.src == 'true' || steps.filter.outputs.pyproject == 'true'
      run: |
        export UV_PROJECT_ENVIRONMENT="$CONDA_PREFIX"
        uv run pytest --cov jaxspec --cov-report xml:coverage-full.xml
      shell: micromamba-shell {0}

    - name: Upload coverage to Codecov
      if: steps.filter.outputs.src == 'true'
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: coverage-full.xml
        flags: full
        fail_ci_if_error: true
        verbose: true
